<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>First Time Visitor</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <div class="container">

    <div class="glass-card form-card">

      <h1>First Time Visitor</h1>

      <p class="subtitle">
        Help us connect with you better.
      </p>

      <form id="visitorForm">

        <div class="form-group">
          <input
            type="text"
            name="fullName"
            placeholder="Full Name"
            required
          >
        </div>

        <div class="form-group">
          <input
            type="text"
            name="phone"
            placeholder="Phone Number"
            required
          >
        </div>

        <div class="form-group">
          <select
            name="gender"
            required
          >
            <option value="">
              Gender
            </option>

            <option value="Male">
              Male
            </option>

            <option value="Female">
              Female
            </option>
          </select>
        </div>

        <div class="form-group">
          <select
            name="ageRange"
            required
          >
            <option value="">
              Age Range
            </option>

            <option>
              Under 18
            </option>

            <option>
              18 - 25
            </option>

            <option>
              26 - 35
            </option>

            <option>
              36 - 50
            </option>

            <option>
              50+
            </option>

          </select>
        </div>

        <div class="form-group">
          <input
            type="text"
            name="area"
            placeholder="Residential Area"
          >
        </div>

        <div class="form-group">
          <input
            type="text"
            name="occupation"
            placeholder="Occupation"
          >
        </div>

        <div class="form-group">
          <select
            name="maritalStatus"
          >
            <option value="">
              Marital Status
            </option>

            <option>
              Single
            </option>

            <option>
              Married
            </option>

            <option>
              Divorced
            </option>

            <option>
              Widowed
            </option>

          </select>
        </div>

        <div class="form-group">
          <input
            type="text"
            name="invitedBy"
            placeholder="Invited By"
          >
        </div>

        <div class="form-group">
          <select
            name="joiningInterest"
          >
            <option value="">
              Interested In Joining?
            </option>

            <option>
              Yes
            </option>

            <option>
              No
            </option>

            <option>
              Maybe
            </option>

          </select>
        </div>

        <div class="form-group">
          <textarea
            name="prayerRequest"
            placeholder="Prayer Request"
          ></textarea>
        </div>

        <button
          type="submit"
          class="submit-btn"
        >
          Submit Information
        </button>

      </form>

    </div>

  </div>

  <script>

    const scriptURL =
      "https://script.google.com/macros/s/AKfycby2aoXLSRc-4AvtxsOXFPs8VNMa8uypIVaox1AYtVoObaWy14m9k1-ew3HOUo1r_js8/exec";

    const form =
      document.getElementById(
        "visitorForm"
      );

    form.addEventListener(
      "submit",
      async function(e){

        e.preventDefault();

        const button =
          document.querySelector(
            ".submit-btn"
          );

        button.innerText =
          "Submitting...";

        const formData =
          new FormData(form);

        const data =
          Object.fromEntries(
            formData.entries()
          );

        try {

          const response =
            await fetch(
              scriptURL,
              {
                method: "POST",
                body:
                  JSON.stringify(data)
              }
            );

          const result =
            await response.json();

          console.log(result);

          if(result.success){

            window.location.href =
              "success.html";

          }

          else {

            alert(
              "Submission failed"
            );

          }

        }

        catch(error){

          console.error(error);

          alert(
            "Submission failed"
          );

        }

        button.innerText =
          "Submit Information";

      }
    );

  </script>

</body>

</html>
