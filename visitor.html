<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>First Time Visitor</title>

  <link rel="stylesheet" href="css/style.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>

  <div class="container">

    <div class="glass-card form-card">

      <h1>First Time Visitor</h1>

      <p class="subtitle">
        Kindly fill this form so we can stay connected with you.
      </p>
      <form id="visitorForm">

  <div class="form-group">
    <input
      type="text"
      name="fullName"
      placeholder="Full Name"
      required
    />
  </div>

  <div class="form-group">
    <input
      type="tel"
      name="phone"
      placeholder="Phone Number"
      required
    />
  </div>

  <div class="form-group">
    <input
      type="email"
      name="email"
      placeholder="Email Address"
    />
  </div>

  <div class="form-group">
    <select name="gender" required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>
  </div>

  <div class="form-group">
    <select name="ageRange" required>
      <option value="">Select Age Range</option>
      <option>Under 18</option>
      <option>18 - 25</option>
      <option>26 - 35</option>
      <option>36 - 50</option>
      <option>50+</option>
    </select>
  </div>

  <div class="form-group">
    <input
      type="text"
      name="area"
      placeholder="Area / Address"
    />
  </div>

  <div class="form-group">
    <input
      type="text"
      name="invitedBy"
      placeholder="Invited By"
    />
  </div>

  <div class="form-group">
    <textarea
      name="prayerRequest"
      placeholder="Prayer Request"
      rows="4"
    ></textarea>
  </div>

  <div class="form-group">
    <select name="firstTime" required>
      <option value="">Is this your first time today?</option>
      <option>Yes</option>
      <option>No</option>
    </select>
  </div>

  <button type="submit" class="submit-btn">
    Submit Information
  </button>

</form>

    </div>

  </div>
<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby_2ZE2QAvET0IisTivTSOlctYFSthi-xSe98Mjjz66hiASaiG5iJWoSbt6cfTe9gZ2/exec";

const form =
  document.getElementById("visitorForm");

form.addEventListener("submit", async function(e) {

  e.preventDefault();

  const button =
    document.querySelector(".submit-btn");

  button.innerText = "Submitting...";

  const formData = new FormData(form);

  const data =
    Object.fromEntries(formData.entries());

  try {

    const response = await fetch(
      scriptURL + "?sheet=visitor",
      {
        method: "POST",
        headers: {
          "Content-Type":
            "application/json"
        },
        body: JSON.stringify(data)
      }
    );

    const result = await response.json();

    console.log(result);

    if(result.success){

      window.location.href =
        "success.html";

    }

    else {

      alert(result.error);

    }

  }

  catch(error){

    console.error(error);

    alert("Submission failed");

  }

  button.innerText =
    "Submit Information";

});

</script>
</body>
</html>
