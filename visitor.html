<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>First Time Visitor</title>

  <link rel="stylesheet" href="css/style.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>

  <div class="container">

    <div class="glass-card form-card">

      <h1>First Time Visitor</h1>

      <p class="subtitle">
        Kindly fill this form so we can stay connected with you.
      </p>

      <form id="visitorForm">

        <div class="form-group">
          <input
            type="text"
            placeholder="Full Name"
            required
          />
        </div>

        <div class="form-group">
          <input
            type="tel"
            placeholder="Phone Number"
            required
          />
        </div>

        <div class="form-group">
          <input
            type="email"
            placeholder="Email Address"
          />
        </div>

        <div class="form-group">
          <select required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>

        <div class="form-group">
          <select required>
            <option value="">Select Age Range</option>
            <option>Under 18</option>
            <option>18 - 25</option>
            <option>26 - 35</option>
            <option>36 - 50</option>
            <option>50+</option>
          </select>
        </div>

        <div class="form-group">
          <input
            type="text"
            placeholder="Area / Address"
          />
        </div>

        <div class="form-group">
          <input
            type="text"
            placeholder="Invited By"
          />
        </div>

        <div class="form-group">
          <textarea
            placeholder="Prayer Request"
            rows="4"
          ></textarea>
        </div>

        <div class="form-group">
          <select required>
            <option value="">Is this your first time today?</option>
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>

        <button type="submit" class="submit-btn">
          Submit Information
        </button>

      </form>

    </div>

  </div>

</body>
</html>
