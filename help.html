<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Help & Support</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <div class="container">

    <div class="glass-card form-card">

      <h1>Help & Support</h1>

      <p class="subtitle">
        Need assistance on the mission field? Let church leadership know how we can support you.
      </p>

      <form>

        <div class="form-group">
          <input
            type="text"
            placeholder="Full Name"
            required
          >
        </div>

        <div class="form-group">
          <input
            type="text"
            placeholder="Phone Number"
            required
          >
        </div>

        <div class="form-group">
          <input
            type="text"
            placeholder="Area / Location"
          >
        </div>

        <div class="form-group">
          <select>
            <option value="">
              Challenge Type
            </option>

            <option>
              Rejection During Evangelism
            </option>

            <option>
              Difficult Questions
            </option>

            <option>
              Follow-Up Challenges
            </option>

            <option>
              Safety Concerns
            </option>

            <option>
              Spiritual Challenges
            </option>

            <option>
              Other
            </option>
          </select>
        </div>

        <div class="form-group">
          <select>
            <option value="">
              Urgency Level
            </option>

            <option>
              Low
            </option>

            <option>
              Medium
            </option>

            <option>
              High
            </option>

            <option>
              Emergency
            </option>
          </select>
        </div>

        <div class="form-group">
          <textarea
            placeholder="Describe your challenge"
          ></textarea>
        </div>

        <button
          type="submit"
          class="submit-btn"
        >
          Request Assistance
        </button>

      </form>

      <br>

      <a
        href="index.html"
        class="secondary-btn"
      >
        Back Home
      </a>

    </div>

  </div>

</body>

</html>
