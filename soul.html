<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Soul Won</title>

  <link rel="stylesheet" href="css/style.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>

  <div class="container">

    <div class="glass-card form-card">

      <h1>Soul Won</h1>

      <p class="subtitle">
        Record souls reached during evangelism for follow-up and support.
      </p>

      <form id="soulForm">

        <div class="form-group">
          <input
            type="text"
            placeholder="Full Name"
            required
          />
        </div>

        <div class="form-group">
          <input
            type="tel"
            placeholder="Phone Number"
          />
        </div>

        <div class="form-group">
          <input
            type="text"
            placeholder="Location Met"
            required
          />
        </div>

        <div class="form-group">
          <select required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>

        <div class="form-group">
          <select required>
            <option value="">Select Age Range</option>
            <option>Under 18</option>
            <option>18 - 25</option>
            <option>26 - 35</option>
            <option>36 - 50</option>
            <option>50+</option>
          </select>
        </div>

        <div class="form-group">
          <select required>
            <option value="">Decision Made</option>
            <option>Accepted Christ</option>
            <option>Rededicated Life</option>
            <option>Requested Prayer</option>
          </select>
        </div>

        <div class="form-group">
          <select required>
            <option value="">Needs Follow Up?</option>
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>

        <div class="form-group">
          <input
            type="text"
            placeholder="Soul Winner Name"
            required
          />
        </div>

        <div class="form-group">
          <textarea
            placeholder="Notes"
            rows="4"
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">
          Save Soul
        </button>

      </form>

    </div>

  </div>

</body>
</html>
