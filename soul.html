<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Soul Won</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <div class="container">

    <div class="glass-card form-card">

      <h1>Soul Won</h1>

      <p class="subtitle">
        Record souls reached during evangelism.
      </p>

      <form id="soulForm">

        <div class="form-group">
          <input
            type="text"
            name="fullName"
            placeholder="Full Name"
            required
          >
        </div>

        <div class="form-group">
          <input
            type="text"
            name="phone"
            placeholder="Phone Number"
          >
        </div>

        <div class="form-group">
          <select
            name="gender"
            required
          >
            <option value="">
              Gender
            </option>

            <option value="Male">
              Male
            </option>

            <option value="Female">
              Female
            </option>
          </select>
        </div>

        <div class="form-group">
          <select
            name="ageRange"
            required
          >
            <option value="">
              Age Range
            </option>

            <option>
              Under 18
            </option>

            <option>
              18 - 25
            </option>

            <option>
              26 - 35
            </option>

            <option>
              36 - 50
            </option>

            <option>
              50+
            </option>

          </select>
        </div>

        <div class="form-group">
          <input
            type="text"
            name="locationMet"
            placeholder="Location Met"
            required
          >
        </div>

        <div class="form-group">
          <select
            name="decisionMade"
            required
          >
            <option value="">
              Decision Made
            </option>

            <option>
              Accepted Christ
            </option>

            <option>
              Rededicated Life
            </option>

            <option>
              Requested Prayer
            </option>

          </select>
        </div>

        <div class="form-group">
          <select
            name="followUp"
          >
            <option value="">
              Needs Follow Up?
            </option>

            <option>
              Yes
            </option>

            <option>
              No
            </option>
          </select>
        </div>

        <div class="form-group">
          <input
            type="text"
            name="soulWinner"
            placeholder="Soul Winner Name"
          >
        </div>

        <div class="form-group">
          <textarea
            name="notes"
            placeholder="Notes"
          ></textarea>
        </div>

        <button
          type="submit"
          class="submit-btn"
        >
          Save Soul
        </button>

      </form>

    </div>

  </div>

  <script>

    const scriptURL =
      "https://script.google.com/macros/s/AKfycby2aoXLSRc-4AvtxsOXFPs8VNMa8uypIVaox1AYtVoObaWy14m9k1-ew3HOUo1r_js8/exec";

    const form =
      document.getElementById(
        "soulForm"
      );

    form.addEventListener(
      "submit",
      async function(e){

        e.preventDefault();

        const button =
          document.querySelector(
            ".submit-btn"
          );

        button.innerText =
          "Saving...";

        const formData =
          new FormData(form);

        const data =
          Object.fromEntries(
            formData.entries()
          );

        try {

          const response =
            await fetch(
              scriptURL +
              "?sheet=soul",
              {
                method: "POST",
                body:
                  JSON.stringify(data)
              }
            );

          const result =
            await response.json();

          console.log(result);

          if(result.success){

            window.location.href =
              "success.html";

          }

          else {

            alert(
              "Submission failed"
            );

          }

        }

        catch(error){

          console.error(error);

          alert(
            "Submission failed"
          );

        }

        button.innerText =
          "Save Soul";

      }
    );

  </script>

</body>

</html>
