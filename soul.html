<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Soul Won</title>

  <link rel="stylesheet" href="css/style.css"/>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>

  <div class="container">

    <div class="glass-card form-card">

      <h1>Soul Won</h1>

      <p class="subtitle">
        Record souls reached during evangelism.
      </p>

      <form id="soulForm">

        <div class="form-group">
          <input type="text" name="fullName" placeholder="Full Name" required />
        </div>

        <div class="form-group">
          <input type="tel" name="phone" placeholder="Phone Number" />
        </div>

        <div class="form-group">
          <input type="text" name="locationMet" placeholder="Location Met" required />
        </div>

        <div class="form-group">
          <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>

        <div class="form-group">
          <select name="ageRange" required>
            <option value="">Select Age Range</option>
            <option value="Under 18">Under 18</option>
            <option value="18 - 25">18 - 25</option>
            <option value="26 - 35">26 - 35</option>
            <option value="36 - 50">36 - 50</option>
            <option value="50+">50+</option>
          </select>
        </div>

        <div class="form-group">
          <select name="decisionMade" required>
            <option value="">Decision Made</option>
            <option value="Accepted Christ">Accepted Christ</option>
            <option value="Rededicated Life">Rededicated Life</option>
            <option value="Requested Prayer">Requested Prayer</option>
          </select>
        </div>

        <div class="form-group">
          <select name="followUp" required>
            <option value="">Needs Follow Up?</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="form-group">
          <input type="text" name="soulWinner" placeholder="Soul Winner Name" required />
        </div>

        <div class="form-group">
          <textarea name="notes" placeholder="Notes"></textarea>
        </div>

        <button type="submit" class="submit-btn">
          Save Soul
        </button>

      </form>

    </div>

  </div>

  <script>

    const scriptURL = "https://script.google.com/macros/s/AKfycby_2ZE2QAvET0IisTivTSOlctYFSthi-xSe98Mjjz66hiASaiG5iJWoSbt6cfTe9gZ2/exec
";

    document
      .getElementById("soulForm")
      .addEventListener("submit", async function(e) {

        e.preventDefault();

        const button = document.querySelector(".submit-btn");

        button.innerText = "Saving...";
        button.disabled = true;

        const formData = new FormData(this);

        const data = Object.fromEntries(formData.entries());

        try {

          await fetch(scriptURL + "?sheet=soul", {

            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify(data)

          });

          window.location.href = "success.html";

        }

        catch(error) {

          console.error(error);

          alert("Submission failed");

          button.innerText = "Save Soul";
          button.disabled = false;

        }

      });

  </script>

</body>
</html>
